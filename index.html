<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Marathon">
<meta name="theme-color" content="#0d0d0d">
<title>Marathon Dec 13</title>
<link rel="manifest" href="./manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d0d0d;
  --surface: #141414;
  --card: #1a1a1a;
  --border: #2a2a2a;
  --accent: #e8ff3a;
  --text: #e8e4dc;
  --muted: #555;
  --muted2: #888;
  --z2: #3af0e8;
  --tempo: #ff6b35;
  --vo2: #e8ff3a;
  --long: #b47fff;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bot: env(safe-area-inset-bottom, 0px);
}
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
html, body { height:100%; overflow:hidden; background:var(--bg); color:var(--text); font-family:'IBM Plex Sans',sans-serif; }

/* ── LAYOUT ── */
#app { display:flex; flex-direction:column; height:100%; padding-top:var(--safe-top); }

/* ── TOP BAR ── */
.topbar {
  flex-shrink:0;
  display:flex; align-items:center; justify-content:space-between;
  padding:12px 16px 10px;
  border-bottom:1px solid var(--border);
  background:var(--bg);
}
.topbar-left { display:flex; flex-direction:column; }
.topbar-title { font-family:'Bebas Neue',sans-serif; font-size:22px; letter-spacing:0.05em; line-height:1; }
.topbar-sub { font-family:'IBM Plex Mono',monospace; font-size:10px; color:var(--muted2); letter-spacing:0.1em; margin-top:2px; }
.topbar-right { display:flex; flex-direction:column; align-items:flex-end; gap:3px; }
.race-countdown { font-family:'Bebas Neue',sans-serif; font-size:26px; color:var(--accent); line-height:1; }
.race-label { font-family:'IBM Plex Mono',monospace; font-size:9px; color:var(--muted); letter-spacing:0.1em; text-transform:uppercase; }

/* ── PROGRESS BAR ── */
.progress-bar-wrap {
  flex-shrink:0;
  padding:8px 16px;
  background:var(--surface);
  border-bottom:1px solid var(--border);
  display:flex; align-items:center; gap:10px;
}
.prog-track { flex:1; height:5px; background:var(--border); border-radius:3px; overflow:hidden; }
.prog-fill { height:100%; background:var(--accent); border-radius:3px; transition:width 0.4s ease; }
.prog-label { font-family:'IBM Plex Mono',monospace; font-size:10px; color:var(--muted2); white-space:nowrap; }

/* ── TAB BAR ── */
.tabs {
  flex-shrink:0;
  display:flex;
  border-bottom:1px solid var(--border);
  background:var(--bg);
  overflow-x:auto;
  scrollbar-width:none;
}
.tabs::-webkit-scrollbar { display:none; }
.tab {
  flex-shrink:0;
  padding:10px 14px;
  font-family:'IBM Plex Mono',monospace;
  font-size:10px;
  letter-spacing:0.1em;
  text-transform:uppercase;
  color:var(--muted);
  cursor:pointer;
  border-bottom:2px solid transparent;
  transition:color 0.15s, border-color 0.15s;
  user-select:none;
  white-space:nowrap;
}
.tab.active { color:var(--accent); border-bottom-color:var(--accent); }

/* ── SCROLL AREA ── */
.scroll-area {
  flex:1;
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
  padding-bottom:calc(16px + var(--safe-bot));
}

/* ── DASHBOARD ── */
.dash-grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:1px;
  background:var(--border);
  margin:12px;
  border:1px solid var(--border);
}
.dash-stat { background:var(--card); padding:14px 16px; }
.dash-stat-label { font-family:'IBM Plex Mono',monospace; font-size:9px; letter-spacing:0.12em; color:var(--muted); text-transform:uppercase; margin-bottom:4px; }
.dash-stat-value { font-family:'Bebas Neue',sans-serif; font-size:28px; line-height:1; }
.dash-stat-sub { font-size:10px; color:var(--muted2); margin-top:3px; }

.current-week-card {
  margin:0 12px 12px;
  background:var(--card);
  border:1px solid var(--border);
  border-left:3px solid var(--accent);
  padding:14px 16px;
}
.cwc-label { font-family:'IBM Plex Mono',monospace; font-size:9px; letter-spacing:0.12em; color:var(--accent); text-transform:uppercase; margin-bottom:6px; }
.cwc-title { font-family:'Bebas Neue',sans-serif; font-size:20px; line-height:1; margin-bottom:4px; }
.cwc-runs { font-size:12px; color:var(--muted2); line-height:1.5; }

.streak-card {
  margin:0 12px 12px;
  background:var(--card);
  border:1px solid var(--border);
  padding:14px 16px;
  display:flex; align-items:center; gap:16px;
}
.streak-num { font-family:'Bebas Neue',sans-serif; font-size:48px; line-height:1; color:var(--tempo); }
.streak-right {}
.streak-title { font-family:'IBM Plex Mono',monospace; font-size:10px; letter-spacing:0.12em; text-transform:uppercase; color:var(--muted2); }
.streak-sub { font-size:12px; color:var(--muted); margin-top:4px; }

/* ── WEEK CARDS ── */
.phase-label {
  margin:16px 12px 8px;
  font-family:'Bebas Neue',sans-serif;
  font-size:20px;
  letter-spacing:0.05em;
  padding-bottom:6px;
  border-bottom:1px solid var(--border);
  display:flex; align-items:baseline; gap:10px;
}
.phase-badge-sm {
  font-family:'IBM Plex Mono',monospace;
  font-size:9px;
  padding:2px 8px;
  border-radius:2px;
  letter-spacing:0.08em;
  text-transform:uppercase;
}

.week-card {
  margin:0 12px 8px;
  background:var(--card);
  border:1px solid var(--border);
  border-radius:2px;
  overflow:hidden;
  transition:border-color 0.2s;
}
.week-card.complete { border-color:#2a4a2a; }
.week-card.active { border-color:var(--accent); }

.week-header {
  display:flex; align-items:center; justify-content:space-between;
  padding:10px 14px;
  cursor:pointer;
  user-select:none;
  background:var(--surface);
}
.week-header-left { display:flex; align-items:center; gap:10px; }
.week-num-badge {
  font-family:'IBM Plex Mono',monospace;
  font-size:10px;
  font-weight:600;
  color:var(--muted);
  min-width:28px;
}
.week-card.active .week-num-badge { color:var(--accent); }
.week-title-wrap {}
.week-title { font-family:'IBM Plex Mono',monospace; font-size:11px; font-weight:600; color:var(--text); letter-spacing:0.05em; }
.week-dates-sm { font-size:10px; color:var(--muted); margin-top:1px; }
.week-right { display:flex; align-items:center; gap:8px; }
.week-miles { font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--muted2); }
.week-progress-dots { display:flex; gap:3px; }
.wdot { width:7px; height:7px; border-radius:2px; background:var(--border); transition:background 0.2s; }
.wdot.done { background:#4caf50; }
.chevron { font-size:10px; color:var(--muted); transition:transform 0.2s; }
.week-card.open .chevron { transform:rotate(180deg); }

.week-body { display:none; padding:6px 14px 12px; }
.week-card.open .week-body { display:block; }

.run-item {
  display:flex; align-items:flex-start; gap:10px;
  padding:9px 0;
  border-bottom:1px solid #1f1f1f;
  cursor:pointer;
  user-select:none;
  transition:opacity 0.15s;
}
.run-item:last-child { border-bottom:none; }
.run-item.done { opacity:0.5; }

.run-check {
  width:20px; height:20px; border-radius:3px;
  border:1.5px solid var(--border);
  flex-shrink:0;
  margin-top:2px;
  display:flex; align-items:center; justify-content:center;
  transition:background 0.15s, border-color 0.15s;
}
.run-item.done .run-check { background:#4caf50; border-color:#4caf50; }
.run-check-icon { display:none; color:#fff; font-size:12px; }
.run-item.done .run-check-icon { display:block; }

.run-content {}
.run-tag-sm {
  display:inline-block;
  font-family:'IBM Plex Mono',monospace;
  font-size:9px; font-weight:600;
  letter-spacing:0.08em;
  padding:2px 6px;
  border-radius:2px;
  text-transform:uppercase;
  margin-bottom:3px;
}
.rtag-z2 { background:rgba(58,240,232,0.12); color:var(--z2); }
.rtag-vo2 { background:rgba(232,255,58,0.12); color:var(--vo2); }
.rtag-tempo { background:rgba(255,107,53,0.12); color:var(--tempo); }
.rtag-long { background:rgba(180,127,255,0.12); color:var(--long); }
.rtag-rest { background:rgba(80,80,80,0.2); color:var(--muted); }
.rtag-strides { background:rgba(255,200,100,0.12); color:#ffc864; }
.rtag-race { background:rgba(232,255,58,0.25); color:var(--accent); border:1px solid var(--accent); }
.run-title-sm { font-size:12px; color:var(--text); font-weight:600; margin-bottom:2px; }
.run-desc-sm { font-size:11px; color:var(--muted2); line-height:1.45; }

/* ── PACING TAB ── */
.pace-section { padding:12px; }
.pace-card {
  background:var(--card);
  border:1px solid var(--border);
  padding:16px;
  margin-bottom:8px;
}
.pace-zone-label { font-family:'IBM Plex Mono',monospace; font-size:9px; letter-spacing:0.12em; text-transform:uppercase; color:var(--muted2); margin-bottom:4px; }
.pace-val { font-family:'Bebas Neue',sans-serif; font-size:32px; line-height:1; margin-bottom:6px; }
.pace-desc-text { font-size:12px; color:var(--muted2); line-height:1.5; }

/* ── SUPPLEMENTAL TAB ── */
.supp-section { padding:12px; }
.supp-card-m {
  background:var(--card);
  border:1px solid var(--border);
  border-radius:2px;
  margin-bottom:8px;
  overflow:hidden;
}
.supp-head-m {
  display:flex; align-items:center; gap:10px;
  padding:12px 14px;
  background:var(--surface);
  border-left:3px solid;
  cursor:pointer; user-select:none;
}
.supp-icon-m { font-size:18px; }
.supp-title-m { font-family:'Bebas Neue',sans-serif; font-size:18px; letter-spacing:0.04em; line-height:1; }
.supp-freq-m { font-family:'IBM Plex Mono',monospace; font-size:9px; color:var(--muted); letter-spacing:0.08em; text-transform:uppercase; margin-top:2px; }
.supp-body-m { display:none; padding:10px 14px 14px; }
.supp-card-m.open .supp-body-m { display:block; }
.supp-chevron { margin-left:auto; font-size:10px; color:var(--muted); transition:transform 0.2s; }
.supp-card-m.open .supp-chevron { transform:rotate(180deg); }

.supp-group-m { margin-bottom:12px; }
.supp-group-label-m { font-family:'IBM Plex Mono',monospace; font-size:9px; letter-spacing:0.1em; text-transform:uppercase; padding-bottom:6px; border-bottom:1px solid #1f1f1f; margin-bottom:8px; }
.ex-item { padding:8px 10px; background:var(--surface); margin-bottom:4px; border-left:2px solid #2a2a2a; }
.ex-name-m { font-size:12px; font-weight:600; color:var(--text); margin-bottom:2px; }
.ex-detail-m { font-size:11px; color:var(--muted2); line-height:1.45; }
.supp-note-m {
  font-family:'IBM Plex Mono',monospace; font-size:10px;
  color:var(--accent); padding:8px 10px;
  background:rgba(232,255,58,0.04);
  border:1px solid rgba(232,255,58,0.1);
  line-height:1.5; margin-top:8px;
}

/* ── RESET BUTTON ── */
.reset-wrap { padding:20px 12px 0; }
.reset-btn {
  width:100%; padding:11px;
  background:transparent; border:1px solid #3a2020;
  color:#8b3a3a; font-family:'IBM Plex Mono',monospace;
  font-size:11px; letter-spacing:0.1em; text-transform:uppercase;
  cursor:pointer; border-radius:2px;
}
.reset-btn:active { background:#3a2020; }

/* ── MISC ── */
.empty-state { text-align:center; padding:40px 20px; color:var(--muted); font-size:13px; }
.complete-banner {
  margin:0 12px 8px;
  background:rgba(76,175,80,0.1);
  border:1px solid rgba(76,175,80,0.3);
  padding:10px 14px;
  font-family:'IBM Plex Mono',monospace;
  font-size:11px; color:#4caf50;
  letter-spacing:0.05em;
  display:none;
}
.week-card.complete .complete-banner { display:block; }

</style>
</head>

// ─────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────
const STORAGE_KEY = 'marathon_tracker_v1';

function loadState() {
  try {
    const s = localStorage.getItem(STORAGE_KEY);
    return s ? JSON.parse(s) : { done: {}, openWeeks: {}, openSupp: {} };
  } catch { return { done: {}, openWeeks: {}, openSupp: {} }; }
}

function saveState(s) {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); } catch {}
}

let STATE = loadState();

// ─────────────────────────────────────────────
// HELPERS
// ─────────────────────────────────────────────
function totalRuns() { return WEEKS.reduce((a,w) => a + w.runs.length, 0); }
function completedRuns() { return Object.values(STATE.done).filter(Boolean).length; }
function weekDone(w) { return w.runs.every(r => STATE.done[r.id]); }
function weekProgress(w) { return w.runs.filter(r => STATE.done[r.id]).length; }

function currentWeek() {
  const now = new Date();
  for (const w of WEEKS) {
    const wDate = parseWeekDate(w.dates);
    const nextW = WEEKS[WEEKS.indexOf(w)+1];
    const nextDate = nextW ? parseWeekDate(nextW.dates) : RACE_DATE;
    if (now >= wDate && now < nextDate) return w;
  }
  return WEEKS[0];
}

function parseWeekDate(str) {
  const months = {Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11};
  const m = str.match(/([A-Za-z]+)\s+(\d+)/);
  if (!m) return new Date('2025-06-05');
  return new Date(2025, months[m[1]], parseInt(m[2]));
}

function daysToRace() {
  const now = new Date();
  const diff = Math.ceil((RACE_DATE - now) / (1000*60*60*24));
  return Math.max(0, diff);
}

function weekStreak() {
  let streak = 0;
  for (let i = WEEKS.length-1; i >= 0; i--) {
    if (weekDone(WEEKS[i])) streak++;
    else break;
  }
  return streak;
}

// ─────────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────────
let currentTab = 'dashboard';

function render() {
  document.getElementById('countdown').textContent = daysToRace();
  const total = totalRuns();
  const comp = completedRuns();
  const pct = total ? Math.round((comp/total)*100) : 0;
  document.getElementById('masterFill').style.width = pct + '%';
  document.getElementById('masterLabel').textContent = `${comp} / ${total} runs · ${pct}%`;

  const area = document.getElementById('scrollArea');
  if (currentTab === 'dashboard') area.innerHTML = renderDashboard();
  else if (currentTab === 'plan') area.innerHTML = renderPlan();
  else if (currentTab === 'pacing') area.innerHTML = renderPacing();
  else if (currentTab === 'supplemental') area.innerHTML = renderSupp();

  bindEvents();
}

function renderDashboard() {
  const cur = currentWeek();
  const comp = completedRuns();
  const total = totalRuns();
  const wComp = WEEKS.filter(weekDone).length;
  const pct = total ? Math.round((comp/total)*100) : 0;
  const streak = weekStreak();

  // Miles logged
  let milesLogged = 0;
  WEEKS.forEach(w => {
    const doneCount = weekProgress(w);
    const totalR = w.runs.length;
    if (totalR > 0) milesLogged += (doneCount / totalR) * parseFloat(w.miles);
  });

  return `
    <div class="dash-grid">
      <div class="dash-stat">
        <div class="dash-stat-label">Runs Done</div>
        <div class="dash-stat-value" style="color:var(--accent)">${comp}</div>
        <div class="dash-stat-sub">of ${total} total</div>
      </div>
      <div class="dash-stat">
        <div class="dash-stat-label">Plan Progress</div>
        <div class="dash-stat-value" style="color:var(--z2)">${pct}%</div>
        <div class="dash-stat-sub">${wComp} weeks complete</div>
      </div>
      <div class="dash-stat">
        <div class="dash-stat-label">Est. Miles Logged</div>
        <div class="dash-stat-value" style="color:var(--long)">${Math.round(milesLogged)}</div>
        <div class="dash-stat-sub">of ~590 planned</div>
      </div>
      <div class="dash-stat">
        <div class="dash-stat-label">Days to Race</div>
        <div class="dash-stat-value" style="color:var(--tempo)">${daysToRace()}</div>
        <div class="dash-stat-sub">Dec 13, 2025</div>
      </div>
    </div>

    <div class="current-week-card">
      <div class="cwc-label">Current Week</div>
      <div class="cwc-title">${cur.label} · ${cur.dates}</div>
      <div class="cwc-runs">${cur.runs.map(r => `${r.title}: ${r.desc}`).join('<br>')}</div>
    </div>

    ${streak > 0 ? `
    <div class="streak-card">
      <div class="streak-num">${streak}</div>
      <div class="streak-right">
        <div class="streak-title">Week Streak 🔥</div>
        <div class="streak-sub">consecutive complete weeks</div>
      </div>
    </div>` : ''}

    <div style="padding:0 12px">
      <div style="font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:0.12em;color:var(--muted);text-transform:uppercase;margin-bottom:8px">Phase Progress</div>
      ${PHASES.map(p => {
        const pWeeks = WEEKS.filter(w => w.phase === p.id);
        const pDone = pWeeks.filter(weekDone).length;
        const pPct = pWeeks.length ? Math.round((pDone/pWeeks.length)*100) : 0;
        return `
        <div style="margin-bottom:12px">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px">
            <div style="font-size:12px;color:${p.color};font-family:'IBM Plex Mono',monospace;font-size:11px">${p.label.split('—')[1]?.trim() || p.label}</div>
            <div style="font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--muted)">${pDone}/${pWeeks.length} wks</div>
          </div>
          <div style="height:4px;background:var(--border);border-radius:2px;overflow:hidden">
            <div style="height:100%;width:${pPct}%;background:${p.color};border-radius:2px;transition:width 0.4s"></div>
          </div>
        </div>`;
      }).join('')}
    </div>

    <div class="reset-wrap">
      <button class="reset-btn" id="resetBtn">⚠ Reset All Progress</button>
    </div>
  `;
}

function renderPlan() {
  let html = '';
  let curPhase = null;

  WEEKS.forEach(w => {
    if (w.phase !== curPhase) {
      curPhase = w.phase;
      const p = PHASES.find(x => x.id === curPhase);
      html += `
        <div class="phase-label" style="color:${p.color}">
          ${p.label}
          <span class="phase-badge-sm" style="background:${p.color}18;color:${p.color}">${p.badge}</span>
        </div>
        <div style="padding:0 12px;margin-bottom:10px">
          <div class="phase-desc" style="font-size:12px;color:var(--muted);font-style:italic">${p.desc}</div>
        </div>`;
    }

    const done = weekDone(w);
    const prog = weekProgress(w);
    const isOpen = STATE.openWeeks[w.id];
    const isCurrent = currentWeek().id === w.id;

    html += `
      <div class="week-card ${done?'complete':''} ${isCurrent&&!done?'active':''} ${isOpen?'open':''}" data-week="${w.id}">
        <div class="week-header" data-toggle="week" data-id="${w.id}">
          <div class="week-header-left">
            <div class="week-num-badge">${w.id.toUpperCase()}</div>
            <div class="week-title-wrap">
              <div class="week-title">${w.label}${isCurrent&&!done?' ← NOW':''}</div>
              <div class="week-dates-sm">${w.dates} · ${w.miles} mi</div>
            </div>
          </div>
          <div class="week-right">
            <div class="week-progress-dots">
              ${w.runs.map(r => `<div class="wdot ${STATE.done[r.id]?'done':''}"></div>`).join('')}
            </div>
            <div class="chevron">▼</div>
          </div>
        </div>
        <div class="week-body">
          ${w.runs.map(r => `
            <div class="run-item ${STATE.done[r.id]?'done':''}" data-run="${r.id}">
              <div class="run-check">
                <span class="run-check-icon">✓</span>
              </div>
              <div class="run-content">
                <span class="run-tag-sm rtag-${r.tag}">${r.tag}</span>
                <div class="run-title-sm">${r.title}</div>
                <div class="run-desc-sm">${r.desc}</div>
              </div>
            </div>
          `).join('')}
        </div>
      </div>`;
  });

  return html;
}

function renderPacing() {
  return `<div class="pace-section">
    <div style="font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:0.1em;margin-bottom:12px">
      SUB-3:30 = ~8:00/MILE · PACE BY EFFORT IN TEXAS SUMMER
    </div>
    ${PACES.map(p => `
      <div class="pace-card">
        <div class="pace-zone-label" style="color:${p.color}">${p.zone}</div>
        <div class="pace-val" style="color:${p.color}">${p.val}</div>
        <div class="pace-desc-text">${p.desc}</div>
      </div>
    `).join('')}
  </div>`;
}

function renderSupp() {
  return `<div class="supp-section">
    ${SUPP.map(s => `
      <div class="supp-card-m ${STATE.openSupp[s.id]?'open':''}" data-supp="${s.id}">
        <div class="supp-head-m" style="border-color:${s.color}" data-toggle="supp" data-id="${s.id}">
          <span class="supp-icon-m">${s.icon}</span>
          <div>
            <div class="supp-title-m">${s.title}</div>
            <div class="supp-freq-m">${s.freq}</div>
          </div>
          <span class="supp-chevron">▼</span>
        </div>
        <div class="supp-body-m">
          ${s.groups.map(g => `
            <div class="supp-group-m">
              <div class="supp-group-label-m" style="color:${s.color}">${g.label}</div>
              ${g.items.map(i => `
                <div class="ex-item">
                  <div class="ex-name-m">${i.name}</div>
                  <div class="ex-detail-m">${i.detail}</div>
                </div>
              `).join('')}
            </div>
          `).join('')}
          <div class="supp-note-m">⚡ ${s.note}</div>
        </div>
      </div>
    `).join('')}
  </div>`;
}

// ─────────────────────────────────────────────
// EVENTS
// ─────────────────────────────────────────────
function bindEvents() {
  // Tabs
  document.querySelectorAll('.tab').forEach(t => {
    t.onclick = () => {
      currentTab = t.dataset.tab;
      document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
      t.classList.add('active');
      render();
      document.getElementById('scrollArea').scrollTop = 0;
    };
  });

  // Week toggles
  document.querySelectorAll('[data-toggle="week"]').forEach(el => {
    el.onclick = () => {
      const id = el.dataset.id;
      STATE.openWeeks[id] = !STATE.openWeeks[id];
      saveState(STATE);
      render();
    };
  });

  // Run checkboxes
  document.querySelectorAll('[data-run]').forEach(el => {
    el.onclick = (e) => {
      e.stopPropagation();
      const id = el.dataset.run;
      STATE.done[id] = !STATE.done[id];
      saveState(STATE);
      render();
    };
  });

  // Supp toggles
  document.querySelectorAll('[data-toggle="supp"]').forEach(el => {
    el.onclick = () => {
      const id = el.dataset.id;
      STATE.openSupp[id] = !STATE.openSupp[id];
      saveState(STATE);
      render();
    };
  });

  // Reset
  const rb = document.getElementById('resetBtn');
  if (rb) rb.onclick = () => {
    if (confirm('Reset all progress? This cannot be undone.')) {
      STATE = { done: {}, openWeeks: {}, openSupp: {} };
      saveState(STATE);
      render();
    }
  };
}

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────
render();

// Register service worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}
